name: Security CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # gitleaks ha bisogno della history

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install bandit pip-audit semgrep

      # ============================================================
      # SAST — Bandit
      # ============================================================
      - name: Bandit SAST
        run: bandit -r . -ll -ii --exclude solution/

      # ============================================================
      # SAST — Semgrep
      # ============================================================
      - name: Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: "p/owasp-top-ten p/python p/security-audit"
        continue-on-error: true   # informativo

      # ============================================================
      # SCA — pip-audit
      # ============================================================
      - name: pip-audit SCA
        run: pip-audit --strict

      # ============================================================
      # Secrets — gitleaks
      # ============================================================
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ============================================================
      # SBOM
      # ============================================================
      - name: Generate SBOM
        run: |
          pip install cyclonedx-bom
          cyclonedx-py environment -o sbom.json

      - name: Upload SBOM
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: sbom.json
          retention-days: 30

      # ============================================================
      # Container scan
      # ============================================================
      - name: Build Docker image
        run: docker build -t myapp:${{ github.sha }} .

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "myapp:${{ github.sha }}"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: 1

      - name: Upload Trivy results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-results.sarif"

      # ============================================================
      # Tests + Coverage (esempio)
      # ============================================================
      - name: Tests
        run: |
          pip install pytest pytest-cov
          # Quando aggiungi test: pytest --cov=. --cov-fail-under=80
        continue-on-error: true
